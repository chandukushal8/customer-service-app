<html>
<head><title>Customer List</title></head>
<body>
<h2>Customer Details</h2>

/add<br><br>

<table border="1">
    <tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th></tr>
    <tr th:each="c : ${customers}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.name}"></td>
        <td th:text="${c.email}"></td>
        <td th:text="${c.phone}"></td>
    </tr>
</table>

</body>
</html>
