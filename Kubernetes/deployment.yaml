apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-app
  template:
    metadata:
      labels:
        app: customer-app
    spec:
      containers:
      - name: customer-app
        image: 210126447401.dkr.ecr.us-east-1.amazonaws.com/customer-service-app:latest
        ports:
        - containerPort: 8080
